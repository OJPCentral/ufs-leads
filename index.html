function Login({ onLogin }) {
  const [users, setUsers] = useState([]);
  const [sel, setSel] = useState("");
  const [pin, setPin] = useState("");
  const [err, setErr] = useState("");
  const [loading, setLoading] = useState(true);

  useEffect(() => { (async () => { const { data } = await supabase.from("users").select("*").order("name");
    if (data) {
      const rolePriority = { rbm: 1, abm: 2, adam: 3, hc: 4 };
      setUsers(data.sort((a, b) => {
        const pa = rolePriority[a.role] || 99;
        const pb = rolePriority[b.role] || 99;
        if (pa !== pb) return pa - pb;
        return a.name.localeCompare(b.name);
      }));
    } setLoading(false); })(); }, []);

  const doLogin = () => {
    const u = users.find(x => x.name === sel);
    if (!u) { setErr("Pilih nama"); return; }
    if (u.pin !== pin) { setErr("PIN salah"); return; }
    onLogin(u);
  };

  if (loading) return <div style={{ background: "#1A2030", minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center" }}><div style={{ color: "#888" }}>Loading...</div></div>;

  return (
    <div style={{ fontFamily: "'Inter',sans-serif", background: "#1A2030", minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
      <div style={{ width: "100%", maxWidth: 340, textAlign: "center" }}>
        <img src={UFS_LOGO} alt="UFS" style={{ height: 48, borderRadius: 8, marginBottom: 20 }} />
        <div style={{ color: "#fff", fontSize: 18, fontWeight: 700, marginBottom: 4 }}>Leads Dashboard</div>
        <div style={{ color: "#888", fontSize: 12, marginBottom: 28 }}>Region Central</div>
        <div style={{ textAlign: "left", marginBottom: 14 }}>
          <div style={{ fontSize: 11, fontWeight: 600, color: "#888", textTransform: "uppercase", marginBottom: 4 }}>Nama</div>
          <select value={sel} onChange={e => { setSel(e.target.value); setErr(""); }} style={{ width: "100%", padding: "12px 14px", background: "#fff", border: "1px solid #E8E8E4", borderRadius: 10, fontSize: 14, cursor: "pointer", outline: "none" }}>
            <option value="">-- Pilih Nama --</option>
            {users.map(u => <option key={u.id} value={u.name}>{u.name} ({u.role.toUpperCase()})</option>)}
          </select>
        </div>
        <div style={{ textAlign: "left", marginBottom: 20 }}>
          <div style={{ fontSize: 11, fontWeight: 600, color: "#888", textTransform: "uppercase", marginBottom: 4 }}>PIN</div>
          <input type="password" maxLength={4} value={pin} onChange={e => { setPin(e.target.value.replace(/\D/g, "")); setErr(""); }} onKeyDown={e => e.key === "Enter" && doLogin()} placeholder="4 digit" style={{ width: "100%", padding: "12px 14px", background: "#fff", border: "1px solid #E8E8E4", borderRadius: 10, fontSize: 14, boxSizing: "border-box", outline: "none", letterSpacing: 8, textAlign: "center" }} />
        </div>
        {err && <div style={{ color: "#F87171", fontSize: 12, marginBottom: 12 }}>{err}</div>}
        <button onClick={doLogin} style={{ width: "100%", padding: 14, background: sel && pin.length === 4 ? "#FF6B00" : "#2A3050", color: sel && pin.length === 4 ? "#fff" : "#475569", border: "none", borderRadius: 10, fontSize: 14, fontWeight: 700, cursor: "pointer" }}>Login</button>
      </div>
    </div>
  );
}

function QuickAddModal({ onSave, onClose, user }) {
  const today = new Date().toISOString().slice(0, 10);
  const defaultOwner = user && user.role === "hc" ? user.name : "";
  const [form, setForm] = useState({ name: "", contact: "", noHP: "", segment: "FSR Indo", alamat: "", kecamatan: "", owner: defaultOwner, source: "Visit", notes: "" });
  const [locStatus, setLocStatus] = useState("idle");
  const [coords, setCoords] = useState(null);
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));
  const detectLocation = () => {
    if (!navigator.geolocation) { setLocStatus("error"); return; }
    setLocStatus("loading");
    navigator.geolocation.getCurrentPosition(p => { setCoords({ lat: p.coords.latitude.toFixed(6), lng: p.coords.longitude.toFixed(6) }); setLocStatus("done"); }, () => setLocStatus("error"), { enableHighAccuracy: true, timeout: 10000 });
  };
  const handleSubmit = () => {
    if (!form.name.trim()) return;
    if (!form.owner) { alert("Pilih HC dulu"); return; }
    onSave({ id: Date.now(), ...form, name: form.name.trim(), stage: "leads", dateLeads: today, dateProspect: null, dateCustomer: null, lostAt: null, coords, geoLink: coords ? "https://www.google.com/maps?q=" + coords.lat + "," + coords.lng : null });
  };
  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,.6)", zIndex: 200, display: "flex", alignItems: "flex-end", justifyContent: "center" }} onClick={onClose}>
      <div style={{ background: "#1A2030", borderRadius: "16px 16px 0 0", width: "100%", maxWidth: 480, maxHeight: "90vh", overflowY: "auto", padding: "20px 20px 32px" }} onClick={e => e.stopPropagation()}>
        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 16 }}>
          <div><div style={{ fontWeight: 700, fontSize: 16, color: "#FFFFFF" }}>Quick Add Lead</div><div style={{ fontSize: 11, color: "#AAA", marginTop: 2 }}>Stage: Leads | {today}</div></div>
          <button onClick={onClose} style={{ border: "none", background: "#F0F0EC", borderRadius: 8, width: 32, height: 32, cursor: "pointer", color: "#888", fontSize: 18 }}>×</button>
        </div>
        <div style={{ marginBottom: 12 }}>
          <span style={S.label}>Lokasi GPS</span>
          <div style={{ display: "flex", gap: 6, alignItems: "center", marginBottom: 6 }}>
            <button onClick={detectLocation} type="button" style={{ padding: "7px 12px", background: locStatus === "done" ? "rgba(52,211,153,0.15)" : "rgba(251,191,36,0.15)", color: locStatus === "done" ? "#34D399" : "#FBBF24", borderRadius: 8, border: "none", cursor: "pointer", fontSize: 11, fontWeight: 600 }}>{locStatus === "idle" ? "Auto Detect" : locStatus === "loading" ? "..." : locStatus === "done" ? "Done" : "Retry"}</button>

    const u = { stage: ns };
    if (ns === "prospect" && !form.dateProspect) u.dateProspect = today;
    if (ns === "customer" && !form.dateCustomer) u.dateCustomer = today;

      <div style={{ padding: "12px 12px 72px" }}>
        {tab === "dashboard" && <>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 12 }}>
            {[{ l: "Total Leads", v: totalLeads, c: "#FF6B00", s: filtered.length + " records" }, { l: "Customers", v: totalCustomers, c: "#34D399" }, { l: "Conversion", v: overallConv + "%", c: "#FBBF24", s: totalCustomers + "/" + totalLeads }, { l: "Avg Velocity", v: avgVelocity === "-" ? "-" : avgVelocity + "w", c: "#38BDF8", s: "Prospect>Cust" }].map((k, i) => <div key={i} style={S.card}><div style={{ fontSize: 10, color: "#888", fontWeight: 500, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 4 }}>{k.l}</div><div style={{ fontSize: 22, fontWeight: 800, color: k.c }}>{k.v}</div>{k.s && <div style={{ fontSize: 10, color: "#AAA", marginTop: 4 }}>{k.s}</div>}</div>)}
          </div>
          <div style={{ ...S.card, marginBottom: 12 }}>
            <div style={S.title}><span style={S.dot("#FF6B00")} />Conversion Funnel</div>
            <div style={{ fontSize: 10, color: "#888", marginBottom: 10 }}>Jumlah lead yang melewati setiap stage</div>
            {activeStages.map((stg, i) => { const st = stageMap[stg]; const pct = totalLeads > 0 ? (funnelCounts[i] / totalLeads * 100) : 0; const cr = i > 0 && funnelCounts[i - 1] > 0 ? ((funnelCounts[i] / funnelCounts[i - 1]) * 100).toFixed(0) : null; const cc = cr ? (parseFloat(cr) >= 75 ? "#34D399" : parseFloat(cr) >= 50 ? "#FBBF24" : "#F87171") : null; const drop = i > 0 ? funnelCounts[i - 1] - funnelCounts[i] : 0; return (<div key={stg} style={{ marginBottom: 6 }}>{cr && <div style={{ display: "flex", alignItems: "center", gap: 6, margin: "4px 0 4px 70px" }}><span style={{ fontSize: 10, fontWeight: 700, color: cc }}>{cr}% convert</span>{drop > 0 && <span style={{ fontSize: 9, color: "#F87171" }}>({drop} drop)</span>}</div>}<div style={{ display: "flex", alignItems: "center", gap: 8 }}><div style={{ width: 70, fontSize: 11, fontWeight: 700 }}>{st.label}</div><div style={{ flex: 1, height: 24, background: "#F0F0EC", borderRadius: 4, overflow: "hidden", position: "relative" }}><div style={{ height: "100%", width: Math.max(pct, 0) + "%", background: st.color, borderRadius: 4, opacity: 0.85 }} /></div><div style={{ width: 55, textAlign: "right" }}><span style={{ fontSize: 14, fontWeight: 800, color: st.color }}>{funnelCounts[i]}</span><span style={{ fontSize: 9, color: "#AAA", marginLeft: 2 }}>{pct.toFixed(0)}%</span></div></div></div>); })}
            <div style={{ marginTop: 10, padding: "10px 12px", background: "#F8F8F4", borderRadius: 8 }}><div style={{ display: "flex", justifyContent: "space-between", gap: 8 }}><div><div style={{ fontSize: 9, color: "#888", textTransform: "uppercase" }}>Win Rate</div><div style={{ fontSize: 16, fontWeight: 800, color: "#34D399" }}>{overallConv}%</div></div><div><div style={{ fontSize: 9, color: "#888", textTransform: "uppercase" }}>Loss Rate</div><div style={{ fontSize: 16, fontWeight: 800, color: "#F87171" }}>{totalLeads > 0 ? ((lostCount / totalLeads) * 100).toFixed(1) : 0}%</div></div><div><div style={{ fontSize: 9, color: "#888", textTransform: "uppercase" }}>Active</div><div style={{ fontSize: 16, fontWeight: 800, color: "#FF6B00" }}>{filtered.filter(l => !["customer", "lost"].includes(l.stage)).length}</div></div></div></div>
          </div>
          {doorOpener.items.length > 0 && <div style={{ ...S.card, marginBottom: 12 }}>
            <div style={S.title}><span style={S.dot("#34D399")} />Door Opener SKU</div>
            <div style={{ background: "#F8F8F4", borderRadius: 8, padding: "12px", textAlign: "center", marginBottom: 12 }}><div style={{ fontSize: 9, color: "#888", textTransform: "uppercase" }}>Total Value NAD</div><div style={{ fontSize: 20, fontWeight: 800, color: "#34D399" }}>Rp{doorOpener.totalVal.toLocaleString("id-ID")}</div></div>
            {doorOpener.items.slice(0, 5).map((s, i) => { const colors = ["#34D399", "#38BDF8", "#FBBF24", "#FB923C", "#FF6B00"]; const c = colors[i % colors.length]; return <div key={s.sku} style={{ marginBottom: 10 }}><div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, marginBottom: 2 }}><span style={{ fontWeight: 600 }}>#{i + 1} {s.sku}</span><span style={{ fontWeight: 800, color: c }}>{s.count} <span style={{ fontSize: 9, color: "#888", fontWeight: 400 }}>({s.pct}%)</span></span></div><div style={{ height: 5, background: "#F0F0EC", borderRadius: 3, marginBottom: 4 }}><div style={{ height: "100%", width: s.pct + "%", background: c, borderRadius: 3, minWidth: 3 }} /></div><div style={{ display: "flex", gap: 12, fontSize: 9, color: "#888" }}>{s.cs > 0 && <span><span style={{ color: "#FF6B00", fontWeight: 700 }}>{s.cs}</span> CS <span style={{ color: "#AAA" }}>Rp{(s.valCs || 0).toLocaleString("id-ID")}</span></span>}{s.pcs > 0 && <span><span style={{ color: "#FBBF24", fontWeight: 700 }}>{s.pcs}</span> PCS <span style={{ color: "#AAA" }}>Rp{(s.valPcs || 0).toLocaleString("id-ID")}</span></span>}</div></div>; })}
          </div>}
          <div style={{ ...S.card, marginBottom: 12, overflowX: "auto" }}>
            <div style={S.title}><span style={S.dot("#38BDF8")} />Horeca Consultant</div>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 11 }}><thead><tr style={{ borderBottom: "1px solid #E8E8E4" }}>{["Name", "Leads", "Prospect", "Cust", "Lost", "Conv", "Vel"].map(h => <th key={h} style={{ padding: "6px 4px", fontWeight: 600, color: "#AAA", textTransform: "uppercase", fontSize: 9, textAlign: h === "Name" ? "left" : "center" }}>{h}</th>)}</tr></thead><tbody>{ownerStats.map((o, i) => <tr key={o.owner} style={{ borderBottom: "1px solid #F0F0EC", background: i % 2 ? "#FAFAF6" : "transparent" }}><td style={{ padding: "8px 4px", fontWeight: 600 }}>{o.owner}</td><td style={{ textAlign: "center", color: "#666" }}>{o.total}</td><td style={{ textAlign: "center", color: "#FBBF24", fontWeight: 700 }}>{o.prospect}</td><td style={{ textAlign: "center", color: "#34D399", fontWeight: 700 }}>{o.cust}</td><td style={{ textAlign: "center", color: "#F87171" }}>{o.lost}</td><td style={{ textAlign: "center", fontWeight: 700, color: parseFloat(o.conv) >= 30 ? "#34D399" : parseFloat(o.conv) >= 15 ? "#FBBF24" : "#F87171" }}>{o.conv}%</td><td style={{ textAlign: "center", color: "#38BDF8" }}>{o.vel === "-" ? "-" : o.vel + "w"}</td></tr>)}</tbody></table>
          </div>
          <div style={{ ...S.card, marginBottom: 12 }}>
            <div style={S.title}><span style={S.dot("#F87171")} />Lost Analysis</div>
            <div style={{ textAlign: "center", marginBottom: 10 }}><span style={{ fontSize: 28, fontWeight: 800, color: "#F87171" }}>{lostCount}</span><div style={{ fontSize: 10, color: "#AAA" }}>Total Lost</div></div>
            {lostAnalysis.map(([stage, count]) => { const st = stageMap[stage]; const pct = lostCount > 0 ? ((count / lostCount) * 100).toFixed(0) : 0; return <div key={stage} style={{ marginBottom: 8 }}><div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, marginBottom: 2 }}><span style={{ color: st?.color, fontWeight: 600 }}>{st?.label || stage}</span><span style={{ color: "#666" }}>{count} ({pct}%)</span></div><div style={{ height: 5, background: "#F0F0EC", borderRadius: 3 }}><div style={{ height: "100%", width: pct + "%", background: st?.color || "#F87171", borderRadius: 3, opacity: 0.7 }} /></div></div>; })}
            {lostAnalysis.length === 0 && <div style={{ fontSize: 11, color: "#AAA", textAlign: "center", padding: 16 }}>No lost leads</div>}
          </div>

        </>}

        {tab === "table" && <div style={{ ...S.card, overflowX: "auto" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}><span style={S.dot("#FF6B00")} /><span style={{ fontSize: 13, fontWeight: 700, textTransform: "uppercase" }}>Leads ({sorted.length})</span><button onClick={exportExcel} style={{ padding: "3px 10px", borderRadius: 5, border: "none", background: "rgba(52,211,153,0.15)", color: "#34D399", fontSize: 10, fontWeight: 600, cursor: "pointer" }}>Export</button></div>
          <input value={searchQ} onChange={e => { setSearchQ(e.target.value); setPage(0); }} placeholder="Cari nama outlet, HC, alamat..." style={{ width: "100%", border: "1px solid #E8E8E4", background: "#fff", borderRadius: 20, padding: "8px 16px", fontSize: 12, color: "#1A1A1A", boxSizing: "border-box", outline: "none", marginBottom: 10 }} />
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 11, tableLayout: "auto" }}><thead><tr style={{ borderBottom: "2px solid #E8E8E4" }}>{[{ k: "x", l: "" }, { k: "name", l: "Name" }, { k: "owner", l: "HC" }, { k: "alamat", l: "Alamat" }, { k: "geo", l: "Maps" }, { k: "contact", l: "PIC" }, { k: "segment", l: "Channel" }, { k: "stage", l: "Stage" }, { k: "dateProspect", l: "Dt.Prospect" }, { k: "dateCustomer", l: "Dt.Customer" }, { k: "duration", l: "Duration" }].map(col => <th key={col.k} onClick={() => !["x", "geo", "duration"].includes(col.k) && toggleSort(col.k)} style={{ padding: "8px 6px", fontWeight: 600, color: "#AAA", textTransform: "uppercase", fontSize: 9, textAlign: "left", cursor: !["x", "geo", "duration"].includes(col.k) ? "pointer" : "default", whiteSpace: "nowrap" }}>{col.l}{sortCol === col.k ? (sortDir === "asc" ? " ↑" : " ↓") : ""}</th>)}</tr></thead>
            <tbody>{sorted.slice(page * PER_PAGE, (page + 1) * PER_PAGE).map((l, i) => { const st = stageMap[l.stage] || { label: l.stage, color: "#888" }; const v = diffWeeks(l.dateProspect, l.dateCustomer); return <tr key={l.id} style={{ borderBottom: "1px solid #F0F0EC", background: i % 2 ? "#FAFAF6" : "transparent" }}><td style={{ padding: "4px 2px" }}>{user.role === "hc" && l.owner === user.name ? <button onClick={() => setEditLead(l)} style={{ padding: "2px 7px", borderRadius: 4, border: "1px solid #E8E8E4", background: "#FAFAF6", color: "#FF6B00", fontSize: 9, fontWeight: 600, cursor: "pointer" }}>Edit</button> : <span style={{ fontSize: 9, color: "#CCC" }}>-</span>}</td><td style={{ padding: "8px 6px", fontWeight: 600, whiteSpace: "nowrap", maxWidth: 150, overflow: "hidden", textOverflow: "ellipsis" }}>{l.name}</td><td style={{ padding: "8px 6px", color: "#666", whiteSpace: "nowrap" }}>{l.owner}</td><td style={{ padding: "8px 6px", color: "#888", fontSize: 10, maxWidth: 120, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{l.alamat || "-"}</td><td style={{ padding: "8px 4px", textAlign: "center" }}>{l.coords ? <a href={"https://www.google.com/maps?q=" + l.coords.lat + "," + l.coords.lng} target="_blank" rel="noopener" style={{ color: "#FF6B00", fontSize: 10, fontWeight: 600, textDecoration: "none" }}>Maps</a> : <span style={{ color: "#CCC", fontSize: 10 }}>-</span>}</td><td style={{ padding: "8px 6px", color: "#888", fontSize: 10 }}>{l.contact || "-"}</td><td style={{ padding: "8px 6px", color: "#666", fontSize: 10 }}>{l.segment || "-"}</td><td><span style={{ fontSize: 9, padding: "2px 8px", borderRadius: 4, fontWeight: 700, background: st.color + "18", color: st.color }}>{st.label}</span></td><td style={{ padding: "8px 6px", color: "#888", fontSize: 10, whiteSpace: "nowrap" }}>{l.dateProspect || "-"}</td><td style={{ padding: "8px 6px", color: "#888", fontSize: 10, whiteSpace: "nowrap" }}>{l.dateCustomer || "-"}</td><td style={{ padding: "8px 6px", fontWeight: 700, color: v ? (v <= 3 ? "#34D399" : v <= 4 ? "#FBBF24" : "#F87171") : "#CCC", whiteSpace: "nowrap" }}>{v ? v + "w" : "-"}</td></tr>; })}</tbody></table>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 10, paddingTop: 10, borderTop: "1px solid #E8E8E4" }}><span style={{ fontSize: 11, color: "#888" }}>Hal {page + 1}/{Math.max(1, Math.ceil(sorted.length / PER_PAGE))} ({sorted.length} data)</span><div style={{ display: "flex", gap: 6 }}><button onClick={() => setPage(p => Math.max(0, p - 1))} disabled={page === 0} style={{ padding: "5px 12px", borderRadius: 6, border: "1px solid #E8E8E4", background: page === 0 ? "#F5F5F0" : "#fff", color: page === 0 ? "#CCC" : "#1A1A1A", fontSize: 11, cursor: page === 0 ? "default" : "pointer" }}>Prev</button><button onClick={() => setPage(p => Math.min(Math.ceil(sorted.length / PER_PAGE) - 1, p + 1))} disabled={(page + 1) * PER_PAGE >= sorted.length} style={{ padding: "5px 12px", borderRadius: 6, border: "1px solid #E8E8E4", background: (page + 1) * PER_PAGE >= sorted.length ? "#F5F5F0" : "#fff", color: (page + 1) * PER_PAGE >= sorted.length ? "#CCC" : "#1A1A1A", fontSize: 11, cursor: (page + 1) * PER_PAGE >= sorted.length ? "default" : "pointer" }}>Next</button></div></div>
        </div>}

        {tab === "find" && <>
          <div style={{ ...S.card, marginBottom: 12 }}>
            <div style={S.title}><span style={S.dot("#FF6B00")} />Find Leads</div>
            <div style={{ display: "flex", gap: 8, marginBottom: 10 }}><input value={searchArea} onChange={e => setSearchArea(e.target.value)} onKeyDown={e => e.key === "Enter" && searchGMaps()} placeholder="Area: cth Cirebon..." style={{ ...S.input, flex: 1 }} /><button onClick={searchGMaps} disabled={searching || !searchArea.trim()} style={{ padding: "10px 16px", background: searching ? "#CCC" : "#FF6B00", color: "#fff", border: "none", borderRadius: 8, fontSize: 12, fontWeight: 700, cursor: "pointer", flexShrink: 0 }}>{searching ? "..." : "Search"}</button></div>
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}><button onClick={() => { const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([["Nama Outlet", "Contact Person", "No HP", "Alamat", "Kecamatan", "Channel", "HC Name", "Source"], ["RM Padang Jaya", "Pak Budi", "081234567890", "Jl. Merdeka No.10", "Kebon Jeruk", "FSR Indo", "Alina", "Visit"]]), "Input"); XLSX.writeFile(wb, "Template_Leads.xlsx"); }} style={{ padding: "8px 12px", background: "rgba(255,107,0,0.12)", color: "#FF6B00", borderRadius: 8, border: "none", cursor: "pointer", fontSize: 11, fontWeight: 600 }}>Template</button><label style={{ padding: "8px 12px", background: "rgba(251,146,60,0.15)", color: "#FB923C", borderRadius: 8, cursor: "pointer", fontSize: 11, fontWeight: 600 }}>Upload<input type="file" accept=".csv,.xlsx,.xls" onChange={handleFileUpload} style={{ display: "none" }} /></label>{uploadStatus && <span style={{ fontSize: 11, color: uploadStatus.type === "success" ? "#34D399" : "#F87171", alignSelf: "center" }}>{uploadStatus.message}</span>}</div>
          </div>
          {searchResults.length > 0 && <div style={S.card}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}><div style={S.title}><span style={S.dot("#34D399")} />Hasil ({searchResults.length})</div><div style={{ display: "flex", gap: 6 }}><button onClick={() => setSearchResults([])} style={{ padding: "4px 10px", borderRadius: 6, border: "1px solid rgba(248,113,113,0.3)", background: "transparent", color: "#F87171", fontSize: 10, cursor: "pointer" }}>Clear</button><button onClick={() => selectedResults.size === searchResults.length ? setSelectedResults(new Set()) : setSelectedResults(new Set(searchResults.map(r => r._id)))} style={{ padding: "4px 10px", borderRadius: 6, border: "1px solid #E8E8E4", background: "transparent", color: "#666", fontSize: 10, cursor: "pointer" }}>{selectedResults.size === searchResults.length ? "Deselect" : "Select All"}</button>{selectedResults.size > 0 && <button onClick={addSelectedToPool} style={{ padding: "4px 10px", borderRadius: 6, border: "none", background: "#34D399", color: "#fff", fontSize: 10, fontWeight: 700, cursor: "pointer" }}>+{selectedResults.size} Add</button>}</div></div>
            {searchResults.map(r => { const sel = selectedResults.has(r._id); return <div key={r._id} onClick={() => toggleSelect(r._id)} style={{ display: "flex", justifyContent: "space-between", padding: "10px 12px", marginBottom: 6, background: sel ? "rgba(52,211,153,0.06)" : "#FAFAF6", border: "1px solid " + (sel ? "rgba(52,211,153,0.3)" : "#E8E8E4"), borderRadius: 8, cursor: "pointer" }}><div><div style={{ fontSize: 12, fontWeight: 700, marginBottom: 2 }}>{r.name}</div><div style={{ fontSize: 10, color: "#888" }}>{r.address}</div></div><div style={{ width: 20, height: 20, borderRadius: 5, border: "2px solid " + (sel ? "#34D399" : "#DDD"), background: sel ? "#34D399" : "transparent", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, marginLeft: 8, alignSelf: "center" }}>{sel && <span style={{ color: "#fff", fontSize: 12, fontWeight: 700 }}>✓</span>}</div></div>; })}
          </div>}
        </>}

        {tab === "chat" && <div style={{ ...S.card, display: "flex", flexDirection: "column", height: "calc(100vh - 140px)" }}>
          <div style={{ ...S.title, flexShrink: 0 }}><span style={S.dot("#FBBF24")} />AI Sales Assistant</div>
          <div style={{ flex: 1, overflowY: "auto", marginBottom: 10 }}>{chatMessages.map((m, i) => <div key={i} style={{ display: "flex", justifyContent: m.role === "user" ? "flex-end" : "flex-start", marginBottom: 8 }}><div style={{ maxWidth: "85%", background: m.role === "user" ? "#FF6B00" : "#F5F5F0", borderRadius: m.role === "user" ? "12px 12px 4px 12px" : "12px 12px 12px 4px", padding: "10px 14px" }}>{m.role === "assistant" && <div style={{ fontSize: 9, color: "#FBBF24", fontWeight: 700, marginBottom: 3 }}>AI</div>}<div style={{ fontSize: 12, color: m.role === "user" ? "#fff" : "#1A1A1A", lineHeight: 1.5, whiteSpace: "pre-wrap" }}>{m.content}</div></div></div>)}{chatLoading && <div style={{ display: "flex" }}><div style={{ background: "#F5F5F0", borderRadius: 12, padding: "10px 14px" }}><div style={{ fontSize: 12, color: "#888" }}>...</div></div></div>}</div>
          <div style={{ display: "flex", gap: 8, flexShrink: 0 }}><input value={chatInput} onChange={e => setChatInput(e.target.value)} onKeyDown={e => e.key === "Enter" && sendChat()} placeholder="Tanya soal HoReCa..." style={{ ...S.input, flex: 1, borderRadius: 20 }} /><button onClick={sendChat} disabled={chatLoading || !chatInput.trim()} style={{ width: 36, height: 36, borderRadius: "50%", background: chatLoading || !chatInput.trim() ? "#DDD" : "#FF6B00", color: "#fff", border: "none", cursor: "pointer", fontSize: 14 }}>Go</button></div>
        </div>}
      </div>

      <div style={{ position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)", width: "100%", maxWidth: 1280, background: "#1A2030", borderTop: "1px solid #2A3040", display: "flex", justifyContent: "space-around", alignItems: "center", height: 56, zIndex: 100 }}>
        {[{ id: "dashboard", icon: "📊", label: "Home" }, { id: "table", icon: "📋", label: "Data" }, { id: "quickadd", icon: "+", label: "Add" }, { id: "find", icon: "🔍", label: "Find" }, { id: "chat", icon: "💬", label: "AI" }].map(item => { const active = item.id !== "quickadd" && tab === item.id; return <button key={item.id} onClick={() => item.id === "quickadd" ? setShowQuickAdd(true) : setTab(item.id)} style={{ border: "none", background: "transparent", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 3, padding: "4px 8px", flex: 1 }}><div style={{ width: 28, height: 28, borderRadius: item.id === "quickadd" ? "50%" : 8, background: item.id === "quickadd" ? "#FF6B00" : active ? "rgba(255,107,0,0.15)" : "transparent", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 15, color: item.id === "quickadd" ? "#fff" : active ? "#FF6B00" : "#fff" }}>{item.icon}</div><span style={{ fontSize: 9, fontWeight: 600, color: active ? "#FF6B00" : "#fff" }}>{item.label}</span></button>; })}
      </div>

      {showQuickAdd && <QuickAddModal onSave={addLead} onClose={() => setShowQuickAdd(false)} user={user} />}
      {editLead && <EditLeadModal lead={editLead} onSave={updateLead} onClose={() => setEditLead(null)} />}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// APP ROOT
// ═══════════════════════════════════════════════════════════
function App() {
  const [user, setUser] = useState(null);
  if (!user) return <Login onLogin={setUser} />;
  return <Dashboard user={user} onLogout={() => setUser(null)} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
